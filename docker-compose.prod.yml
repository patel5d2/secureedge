version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secureedge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secureedge
      POSTGRES_USER: secureedge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secureedge_prod}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureedge -d secureedge"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: secureedge_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: secureedge_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://secureedge:${DB_PASSWORD:-secureedge_prod}@postgres:5432/secureedge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SESSION_TTL_SECONDS: 3600
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3001:3001"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
      replicas: 2

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: secureedge_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Observability
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: secureedge_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:10.2.3
    container_name: secureedge_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
