version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secureedge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secureedge
      POSTGRES_USER: secureedge
      POSTGRES_PASSWORD: secureedge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureedge -d secureedge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secureedge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
