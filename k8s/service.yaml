apiVersion: v1
kind: Service
metadata:
  name: secureedge-backend
  labels:
    app: secureedge
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: secureedge
    component: backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secureedge-ingress
  labels:
    app: secureedge
  annotations:
    # NGINX ingress controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Enable SSE support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # TLS
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - secureedge.example.com
      secretName: secureedge-tls
  rules:
    - host: secureedge.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: secureedge-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: secureedge-frontend
                port:
                  number: 80
