apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureedge-backend
  labels:
    app: secureedge
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secureedge
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: secureedge
        component: backend
    spec:
      serviceAccountName: secureedge-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: secureedge/backend:latest
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: secureedge-config
            - secretRef:
                name: secureedge-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secureedge-backend
  labels:
    app: secureedge
    component: backend
